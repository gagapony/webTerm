<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="ocean" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#023e8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#03045e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0096c7;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ocean)"/>
  <ellipse cx="400" cy="280" rx="500" ry="80" fill="url(#wave)"/>
  <ellipse cx="200" cy="320" rx="400" ry="60" fill="url(#wave)" opacity="0.5"/>
  <ellipse cx="600" cy="350" rx="350" ry="50" fill="url(#wave)" opacity="0.4"/>
  <circle cx="650" cy="80" r="50" fill="#90e0ef" opacity="0.6"/>
  <text x="400" y="220" text-anchor="middle" fill="#90e0ef" font-family="sans-serif" font-size="24" font-weight="bold">Ocean</text>
</svg>