<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebTerm</title>
  <link rel="stylesheet" href="/css/term.css">
  <link rel="stylesheet" href="/lib/xterm.css">
  <style>
    @font-face {
      font-family: 'MonaspiceAr NFM Medium';
      src: url('/fonts/MonaspiceArNerdFontMono-Medium.otf') format('opentype');
      font-weight: 500;
      font-style: normal;
      font-display: block;
    }
    @font-face {
      font-family: 'MonaspiceAr NFM';
      src: url('/fonts/MonaspiceArNerdFontMono-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: block;
    }
    .xterm {
      font-family: 'MonaspiceAr NFM Medium', 'MonaspiceAr NFM', monospace !important;
    }
    .terminal-viewport { cursor: text; }
    .terminal-frame, .terminal-pane, .terminal-pane-tabs { border-radius: 0 !important; }
    .masthead { gap: 6px; align-items: center; min-width: 0; }
    .brand { flex-shrink: 0; }
    .status-stack { min-width: 0; padding: 0; display: flex; flex-direction: column; gap: 0; }
    .status-headline { font-size: 11px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-detail { font-size: 9px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .toolbar-button.is-icon-only { width: 32px; min-width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }

    /* Login */
    .login-overlay { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; background: rgba(2, 6, 23, 0.95); backdrop-filter: blur(20px); }
    .login-overlay[hidden] { display: none; }
    .login-card { width: min(400px, 90%); padding: 32px; border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 20px; background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(10, 16, 30, 0.98)); box-shadow: 0 24px 64px rgba(2, 6, 23, 0.6); }
    .login-card h1 { margin: 0 0 8px; font-size: 24px; font-weight: 700; color: var(--text); }
    .login-card p { margin: 0 0 24px; color: var(--muted); font-size: 13px; }
    .login-card .compact-field { margin-bottom: 16px; }
    .login-card .chrome-button { width: 100%; margin-top: 8px; }
    .login-error { color: #f87171; font-size: 12px; margin-top: 12px; text-align: center; }

    /* Saved connections */
    .saved-connections-dropdown { position: absolute; top: calc(100% + 8px); right: 0; z-index: 20; width: 320px; max-height: 400px; overflow-y: auto; border: 1px solid rgba(148, 163, 184, 0.18); border-radius: 12px; background: rgba(7, 12, 22, 0.98); box-shadow: 0 18px 44px rgba(2, 6, 23, 0.5); padding: 12px; }
    .saved-connections-dropdown[hidden] { display: none; }
    .saved-connections-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .saved-connections-header strong { color: var(--text); font-size: 12px; }
    .saved-connections-list { display: grid; gap: 6px; }
    .saved-connection-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border: 1px solid rgba(148, 163, 184, 0.1); border-radius: 8px; background: rgba(15, 23, 42, 0.4); cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .saved-connection-item:hover { background: rgba(30, 64, 175, 0.2); border-color: rgba(96, 165, 250, 0.3); }
    .saved-connection-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: rgba(96, 165, 250, 0.15); color: #93c5fd; }
    .saved-connection-info { flex: 1; min-width: 0; }
    .saved-connection-name { color: var(--text); font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .saved-connection-meta { color: var(--muted); font-size: 10px; }
    .saved-connection-delete { width: 20px; height: 20px; padding: 0; border: 0; border-radius: 4px; background: transparent; color: rgba(148, 163, 184, 0.6); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .saved-connection-delete:hover { background: rgba(248, 113, 113, 0.2); color: #fca5a5; }
    .saved-connections-empty { color: var(--muted); font-size: 11px; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <!-- Login Overlay -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <h1>WebTerm</h1>
      <p>Please login to continue</p>
      <form id="loginForm">
        <div class="compact-field">
          <label class="toolbar-label">USERNAME</label>
          <input type="text" class="toolbar-input" id="loginUsername" placeholder="admin" autocomplete="username" required>
        </div>
        <div class="compact-field">
          <label class="toolbar-label">PASSWORD</label>
          <input type="password" class="toolbar-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="chrome-button is-primary">Login</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" style="display: none;">
    <header class="topbar">
      <div class="topbar-row topbar-row-main">
        <div class="masthead">
          <div class="brand">
            <svg class="brand-mark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 17 10 11 4 5"></polyline>
              <line x1="12" y1="19" x2="20" y2="19"></line>
            </svg>
            <span class="brand-title">WebTerm</span>
          </div>
          <div class="status-stack">
            <div class="status-headline" id="statusHeadline">Connecting...</div>
            <div class="status-detail" id="statusDetail">Local Shell</div>
          </div>
        </div>

        <div class="toolbar-actions" style="position: relative;">
          <button class="toolbar-button chrome-button is-icon-only" id="savedConnBtn" title="Saved Connections">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>
          <button class="toolbar-button chrome-button is-icon-only" id="reconnectBtn" title="Reconnect">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23 4 23 10 17 10"></polyline>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
            </svg>
          </button>
          <button class="toolbar-button chrome-button is-icon-only is-primary" id="newSessionBtn" title="New Session">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <div class="saved-connections-dropdown" id="savedConnDropdown" hidden>
            <div class="saved-connections-header">
              <strong>Saved Connections</strong>
            </div>
            <div class="saved-connections-list" id="savedConnList">
              <div class="saved-connections-empty">No saved connections</div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="terminal-shell">
      <div class="terminal-frame">
        <div class="terminal-stage">
          <div class="terminal-panels is-layout-managed" id="terminalPanels">
            <div class="terminal-pane" data-focused="true">
              <div class="terminal-pane-tabs" id="paneTabs">
                <div class="session-tabs-bar" data-empty="true" id="sessionTabsBar">
                  <div class="session-tabs" id="sessionTabs"></div>
                  <div class="session-tabs-empty">No active sessions</div>
                </div>
              </div>
              <div class="terminal-pane-body">
                <div class="terminal-viewport" id="terminalViewport"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- New Session Modal -->
  <div class="settings-modal" data-open="false" id="newSessionModal" hidden>
    <div class="settings-scrim" id="newSessionScrim"></div>
    <div class="settings-dialog">
      <div class="settings-header">
        <div class="settings-copy">
          <span class="settings-kicker">SESSION</span>
          <h2 class="settings-title">New Terminal Session</h2>
          <p class="settings-subtitle">Create a new SSH, Telnet, or local shell connection.</p>
        </div>
        <button class="settings-close-button" id="newSessionClose">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <div class="settings-grid">
          <div class="compact-field">
            <label class="toolbar-label">CONNECTION NAME</label>
            <input type="text" class="toolbar-input" id="connectionName" placeholder="My Server" autocomplete="off">
          </div>
          <div class="settings-transport">
            <div class="settings-transport-copy">
              <span class="toolbar-label">PROTOCOL</span>
            </div>
            <div class="workspace-switcher">
              <button class="workspace-chip is-active" data-protocol="ssh">SSH</button>
              <button class="workspace-chip" data-protocol="telnet">Telnet</button>
              <button class="workspace-chip" data-protocol="local">Local</button>
            </div>
          </div>
          <div id="remoteFields">
            <div class="compact-field">
              <label class="toolbar-label">HOST</label>
              <input type="text" class="toolbar-input" id="sessionHost" placeholder="192.168.1.100" autocomplete="off">
            </div>
            <div class="compact-field">
              <label class="toolbar-label">PORT</label>
              <input type="number" class="toolbar-input" id="sessionPort" placeholder="22" autocomplete="off">
            </div>
            <div class="compact-field" id="usernameField">
              <label class="toolbar-label">USERNAME</label>
              <input type="text" class="toolbar-input" id="sessionUsername" placeholder="root" autocomplete="off">
            </div>
            <div class="compact-field" id="passwordField">
              <label class="toolbar-label">PASSWORD</label>
              <input type="password" class="toolbar-input" id="sessionPassword" placeholder="••••••••" autocomplete="off">
            </div>
          </div>
          <div id="localFields" style="display: none;">
            <div class="compact-field">
              <label class="toolbar-label">SHELL</label>
              <input type="text" class="toolbar-input" id="sessionShell" placeholder="/bin/bash" autocomplete="off">
            </div>
          </div>
        </div>
      </div>
      <div class="settings-footer">
        <p class="settings-footer-note" id="connectionStatus"></p>
        <div class="settings-footer-actions">
          <button class="chrome-button" id="saveConnectionBtn">Save</button>
          <button class="chrome-button" id="newSessionCancel">Cancel</button>
          <button class="chrome-button is-primary" id="connectBtn">Connect</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/lib/xterm.js?v=4"></script>
  <script src="/lib/addon-fit.js?v=4"></script>
  <script src="/lib/addon-web-links.js?v=4"></script>
  <script src="/js/app.js?v=4"></script>
</body>
</html>
