<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- ============================================================
       WebTerm — Style B: "Phosphor Bloom"
       Cyberpunk. Phosphor cyan on near-black, faint grid, CRT vibe.
       Shaper corners (rx=24) — bezeled hardware, not soft tile.
       ============================================================ -->

  <defs>
    <radialGradient id="bgB" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#10131a"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>

    <linearGradient id="inkB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>

    <!-- Bloom: a tight inner halo + a softer outer halo, merged
         with the source. Stays defined at 16x16 — wider bloom
         would smear at small sizes. -->
    <filter id="bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"   result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#22d3ee" stroke-width="0.5" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Tile: rx=24 — sharper than the minimalist version, reads as
       hardware bezel. Hairline edge stroke at 18% so the cyan
       bezel frame ties back to the glyph color. -->
  <rect x="0" y="0" width="256" height="256" rx="24" ry="24" fill="url(#bgB)"/>
  <rect x="0" y="0" width="256" height="256" rx="24" ry="24" fill="url(#grid)"/>
  <rect x="0.5" y="0.5" width="255" height="255" rx="23.5" ry="23.5"
        fill="none" stroke="#22d3ee" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Horizon scan line: a single hairline catch-light at ~60% so
       the lower half doesn't go dead against the dark gradient. -->
  <line x1="20" y1="160" x2="236" y2="160" stroke="#22d3ee" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Glyph drawn as filled paths so the bloom filter stays
       homogeneous over both arms of the chevron and the
       underscore. (Filter + <line> mixes were inconsistent
       across rasterizers.) -->
  <g fill="url(#inkB)" filter="url(#bloom)">
    <path d="
      M 70 78
      L 70 92
      L 108 128
      L 70 164
      L 70 178
      L 86 178
      L 128 128
      L 86 78
      Z" />
    <rect x="146" y="172" width="60" height="20" rx="10" ry="10"/>
  </g>
</svg>
